<!doctype html>
<html lang="ar-TN" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="تفاصيل منتوج من كاتالوڨ الفخامة مع القياس وطريقة حساب السوم."
    />
    <title>تفاصيل المنتوج | الفخامة</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="الصفحة الرئيسية الفخامة">
        <img src="assets/alfakhama-logo.png" alt="شعار الفخامة فن الخشب" />
      </a>

      <nav aria-label="التنقل الرئيسي">
        <a href="index.html">الرئيسية</a>
        <a href="products.html">كل المنتوجات</a>
        <a href="index.html#custom">طلب خاص</a>
        <a href="index.html#contact">اتصل بينا</a>
      </nav>

      <a class="button button-small messenger-link" href="#">اطلب</a>
    </header>

    <main>
      <section class="single-product" aria-live="polite">
        <div class="single-product-media">
          <img id="product-image" src="assets/porsche-wall-art.jpg" alt="" />
        </div>

        <article class="single-product-copy">
          <a class="text-link" href="products.html">رجوع للكاتالوڨ</a>
          <p class="product-tag" id="product-category">منتوج</p>
          <h1 id="product-title">تفاصيل المنتوج</h1>
          <p id="product-description">
            اختار منتوج من الكاتالوڨ باش تظهر التفاصيل هنا.
          </p>

          <dl class="product-specs single-specs">
            <div>
              <dt>القياس</dt>
              <dd id="product-size">القياس على الطلب</dd>
            </div>
            <div>
              <dt>السوم</dt>
              <dd>الطول × العرض × سعر 1سم × 1سم</dd>
            </div>
            <div>
              <dt>التفاصيل</dt>
              <dd id="product-extra">حسب الطلب</dd>
            </div>
          </dl>

          <div class="product-actions">
            <a class="button messenger-link" href="#">اطلب على Messenger</a>
            <a class="button button-quiet" href="index.html#custom">طلب تصميم خاص</a>
          </div>
        </article>
      </section>
    </main>

    <footer class="site-footer">
      <img
        class="footer-logo"
        src="assets/alfakhama-logo.png"
        alt="شعار الفخامة فن الخشب"
      />
      <p>ديكور حيطان وقطع حسب الطلب.</p>
    </footer>

    <script src="script.js"></script>
    <script src="product-detail.js"></script>
  </body>
</html>
